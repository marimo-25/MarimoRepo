name: Deploy Household.Functions

on:
  push:
    branches:
      # - main
      - develop
    paths:
      - 'src/Household.Functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_PATH: src/Household.Functions/Household.Functions.csproj
  PUBLISH_DIR: ./publish/functions
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION || '8.0.x' }}

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      # Testプロジェクトを追加後、有効にする
      # - name: Test
      #   run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_DIR }} --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: household-functions
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 7

  deploy:
    name: Deploy to Azure Functions
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: none
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: household-functions
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@ac2abfb0e49d12ed5d273a3cb39f01bdd1654c43  # v1.5.5
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
