# ============================================================
# Household.Web → Azure App Service デプロイ
#
# [事前設定が必要な GitHub Secrets / Variables]
# ── Secrets (Settings > Secrets and variables > Actions) ──
#   AZURE_WEBAPP_PUBLISH_PROFILE  : App Service の発行プロファイル XML
#                                   (Azure Portal > App Service > 発行プロファイルのダウンロード)
#
# ── Variables (Settings > Secrets and variables > Actions) ──
#   AZURE_WEBAPP_NAME             : App Service のリソース名 (例: household-web-prod)
#   DOTNET_VERSION                : 使用する .NET バージョン (デフォルト: 8.0.x)
#
# [オプション: OIDC 認証に切り替える場合]
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID を Secrets に追加し
#   下部のコメントアウトされた azure/login ステップを有効化してください。
# ============================================================

name: Deploy Household.Web

on:
  push:
    branches:
      - main
    paths:
      - 'src/Household.Web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_PATH: src/Household.Web/Household.Web.csproj
  PUBLISH_DIR: ./publish/web
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION || '8.0.x' }}

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      # テストプロジェクトが追加された場合はコメントを外してください
      # - name: Test
      #   run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_DIR }} --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: household-web
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 7

  deploy:
    name: Deploy to Azure App Service
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: none
      id-token: write
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: household-web
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383  # v3.0.8
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Azure Logout
        if: always()
        run: az logout
